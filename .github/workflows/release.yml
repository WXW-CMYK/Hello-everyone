name: Build Desktop Installers

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            build-command: npm run dist:mac
            artifact-name: smart-brochure-generator-macos
            artifact-path: release/*.dmg
          - name: Windows
            os: windows-latest
            build-command: npm run dist:win
            artifact-name: smart-brochure-generator-windows
            artifact-path: release/*.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package installer
        run: ${{ matrix.build-command }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
